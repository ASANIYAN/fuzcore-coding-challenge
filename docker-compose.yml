services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: challenge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/challenge
      NODE_ENV: development
      PORT: 5000
      HOST: 0.0.0.0
      REDIS_URL: redis://redis:6379
      HMAC_SECRET: local-dev-hmac-secret-string-min-32
      SESSION_SECRET: local-dev-session-secret-string-min-32
      STRIPE_SECRET_KEY: sk_test_local_dev
      STRIPE_WEBHOOK_SECRET: whsec_local_dev
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm run db:push && npm run dev"

volumes:
  pgdata:
  redisdata:
  node_modules:
